services:
  postgres:
    image: postgres:16-alpine
    container_name: auction-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: auction_platform
      POSTGRES_USER: auction
      POSTGRES_PASSWORD: auction123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auction -d auction_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: auction-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auction-backend
    restart: unless-stopped
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=auction_platform;Username=auction;Password=auction123"
      FrontendUrl: "http://localhost:5173"
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: auction-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: "http://localhost:8080"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres-data:
  minio-data: